<form (ngSubmit)="onSubmit()" class="form-grid">
  <div class="field">
    <label>Name</label>
    <input type="text" name="name" [(ngModel)]="trip.name" required />
  </div>

  <div class="field">
    <label>Code</label>
    <input type="text" name="code" [(ngModel)]="trip.code" required />
  </div>

  <div class="field">
    <label>Length</label>
    <input type="text" name="length" [(ngModel)]="trip.length" required />
  </div>

  <div class="field">
    <label>Start Date</label>
    <input type="date" name="start" [(ngModel)]="trip.start" required />
  </div>

  <div class="field">
    <label>Resort</label>
    <input type="text" name="resort" [(ngModel)]="trip.resort" required />
  </div>

  <div class="field">
    <label>Price Per Person</label>
    <input type="number" name="perPerson" [(ngModel)]="trip.perPerson" required />
  </div>

  <div class="field">
    <label>Image Filename</label>
    <input type="text" name="image" [(ngModel)]="trip.image" required />
  </div>

  <div class="field full">
    <label>Description</label>
    <textarea name="description" [(ngModel)]="trip.description" required></textarea>
  </div>

  <div class="full actions">
    <button type="submit">Add Trip</button>
  </div>

  <p class="error full" *ngIf="errorMessage">{{ errorMessage }}</p>
</form>
